<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI in the Newsroom - Dataset Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:     #1a1a1a;
    --paper:   #f5f0e8;
    --cream:   #ede8dc;
    --rule:    #c8bfad;
    --accent:  #c0392b;
    --accent2: #2c5f8a;
    --muted:   #7a7060;
    --tag-bg:  #e8e2d6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .masthead { background: var(--ink); color: var(--paper); padding: 40px 48px 32px; border-bottom: 3px solid var(--accent); }
  .masthead-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--rule); margin-bottom: 12px; }
  .masthead h1 { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 4vw, 48px); line-height: 1.1; font-weight: 400; }
  .masthead h1 em { font-style: italic; color: #c8bfad; }
  .masthead-meta { margin-top: 16px; font-size: 12px; color: var(--rule); display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; }
  .generated { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; margin-left: auto; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; background: var(--rule); border-bottom: 1px solid var(--rule); }
  .stat-cell { background: var(--cream); padding: 20px 24px; text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 220px); }

  .sidebar { background: var(--cream); border-right: 1px solid var(--rule); overflow-y: auto; position: sticky; top: 0; max-height: calc(100vh - 220px); }
  .sidebar-section { padding: 18px 18px 14px; border-bottom: 1px solid var(--rule); }
  .sidebar-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 8px 10px 8px 32px; border: 1px solid var(--rule); background: white; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); border-radius: 2px; outline: none; }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }

  .year-chart { display: flex; align-items: flex-end; gap: 3px; height: 52px; margin-top: 8px; }
  .year-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .year-bar { width: 100%; background: var(--rule); border-radius: 1px 1px 0 0; transition: background 0.15s; min-height: 2px; }
  .year-bar-wrap:hover .year-bar, .year-bar-wrap.active .year-bar { background: var(--accent); }
  .year-label { font-size: 8px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .filter-btn { display: flex; width: 100%; padding: 5px 8px; background: none; border: none; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); border-radius: 2px; justify-content: space-between; align-items: center; transition: background 0.12s; }
  .filter-btn:hover { background: var(--tag-bg); }
  .filter-btn.active { background: var(--ink); color: white; }
  .filter-btn.active .filter-count { background: var(--accent); color: white; }
  .filter-count { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--tag-bg); padding: 1px 6px; border-radius: 10px; color: var(--muted); flex-shrink: 0; margin-left: 6px; }

  .reset-btn { width: 100%; padding: 8px; background: none; border: 1px solid var(--rule); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .reset-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  .main { overflow-y: auto; }
  .toolbar { padding: 10px 24px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 10; }
  .result-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .result-count strong { color: var(--ink); font-size: 14px; }
  .sort-select { font-family: 'DM Sans', sans-serif; font-size: 12px; border: 1px solid var(--rule); padding: 5px 8px; background: white; color: var(--ink); cursor: pointer; }

  .cards { padding: 12px 20px; display: flex; flex-direction: column; gap: 1px; }
  .card { background: white; border: 1px solid var(--rule); padding: 14px 18px; display: grid; grid-template-columns: 1fr auto; gap: 6px 14px; align-items: start; transition: border-color 0.15s, box-shadow 0.15s; }
  .card:hover { border-color: var(--accent2); box-shadow: 2px 2px 0 var(--accent2); }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 15px; font-weight: 400; line-height: 1.3; color: var(--ink); }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent2); }
  .card-date { grid-column: 2; grid-row: 1; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; text-align: right; }
  .card-meta { font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; grid-column: 1 / -1; }
  .tag { display: inline-block; padding: 2px 7px; background: var(--tag-bg); border-radius: 2px; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.3px; }
  .tag.source { background: #dce8f0; color: #2c5f8a; }
  .tag.country { background: #f0e8dc; color: #8a5c2c; }

  .loading, .no-results { padding: 60px 24px; text-align: center; color: var(--muted); }
  .loading p, .no-results p:first-child { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 8px; }

  .pagination { padding: 20px 24px; display: flex; justify-content: center; gap: 4px; }
  .page-btn { padding: 6px 12px; border: 1px solid var(--rule); background: white; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; border-radius: 2px; color: var(--ink); transition: all 0.15s; }
  .page-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--rule); }
    .masthead { padding: 24px; }
    .generated { display: none; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-label">Oxford Dissertation Research - AI in Journalism</div>
  <h1>AI Adoption in News Organisations<br><em>Dataset Explorer</em></h1>
  <div class="masthead-meta">
    <span><span class="dot"></span>JournalismAI Case Studies</span>
    <span><span class="dot"></span>ONA AI in the Newsroom</span>
    <span><span class="dot"></span>Reuters Institute DNR 2025</span>
    <span class="generated" id="generatedAt"></span>
  </div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-cell"><div class="stat-num">...</div><div class="stat-label">Loading</div></div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Search</div>
      <div class="search-wrap">
        <span class="search-icon">&#x2315;</span>
        <input type="text" id="searchInput" placeholder="Organisation, keyword...">
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Year</div>
      <div class="year-chart" id="yearChart"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Category</div>
      <div id="categoryFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Source</div>
      <div id="sourceFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Country</div>
      <div id="countryFilters"></div>
    </div>
    <div class="sidebar-section">
      <button class="reset-btn" id="resetBtn">Reset all filters</button>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="result-count" id="resultCount">Loading...</div>
      <select class="sort-select" id="sortSelect">
        <option value="date_desc">Date: newest first</option>
        <option value="date_asc">Date: oldest first</option>
        <option value="title_asc">Title A-Z</option>
        <option value="org_asc">Organisation A-Z</option>
      </select>
    </div>
    <div class="cards" id="cards">
      <div class="loading"><p>Loading data...</p><p>Fetching use cases from database</p></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
var ALL_DATA = [];
var STATS = {};
var filtered = [];
var currentPage = 1;
var PAGE_SIZE = 30;
var activeYear = null;
var activeCategories = new Set();
var activeSources = new Set();
var activeCountries = new Set();
var searchQuery = '';

function esc(s) {
  var el = document.createElement('div');
  el.textContent = String(s || '');
  return el.innerHTML;
}

function init() {
  fetch('data.json')
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' loading data.json');
      return resp.json();
    })
    .then(function(payload) {
      ALL_DATA = payload.records;
      STATS = payload.stats;
      var genEl = document.getElementById('generatedAt');
      if (genEl) genEl.textContent = 'Generated ' + payload.generated_at;
      filtered = ALL_DATA.slice();
      buildStats();
      buildYearChart();
      buildFilters('categoryFilters', 'categories', activeCategories, toggleCategory);
      buildFilters('sourceFilters', 'sources', activeSources, toggleSource);
      buildFilters('countryFilters', 'countries', activeCountries, toggleCountry);
      applyFilters();
    })
    .catch(function(err) {
      document.getElementById('cards').innerHTML =
        '<div class="no-results"><p>Error loading data</p><p>' + err.message + '</p></div>';
      console.error('Dashboard error:', err);
    });

  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase();
    currentPage = 1;
    applyFilters();
  });

  document.getElementById('sortSelect').addEventListener('change', function() {
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    resetAll();
  });
}

function buildStats() {
  var orgs = {};
  var countries = {};
  var sources = {};
  var years = {};
  ALL_DATA.forEach(function(d) {
    if (d.organisation) orgs[d.organisation] = true;
    if (d.source_name) sources[d.source_name] = true;
    var yr = (d.date_published || '').slice(0, 4);
    if (yr && parseInt(yr) > 2010) years[yr] = true;
    (d.country || '').split(',').forEach(function(c) {
      c = c.trim();
      if (c) countries[c] = true;
    });
  });
  var html =
    mkStat(ALL_DATA.length, 'Use Cases') +
    mkStat(Object.keys(orgs).length, 'Organisations') +
    mkStat(Object.keys(countries).length, 'Countries') +
    mkStat(Object.keys(sources).length, 'Sources') +
    mkStat(Object.keys(years).length, 'Years Covered');
  document.getElementById('statsRow').innerHTML = html;
}

function mkStat(n, label) {
  return '<div class="stat-cell"><div class="stat-num">' + n + '</div><div class="stat-label">' + label + '</div></div>';
}

function buildYearChart() {
  var years = STATS.by_year || [];
  if (!years.length) return;
  var maxN = 0;
  years.forEach(function(y) { if (y[1] > maxN) maxN = y[1]; });
  var html = '';
  years.forEach(function(item) {
    var yr = item[0];
    var n = item[1];
    var h = Math.max(4, Math.round(n / maxN * 46));
    var cls = activeYear === yr ? 'year-bar-wrap active' : 'year-bar-wrap';
    html += '<div class="' + cls + '" data-year="' + yr + '" title="' + yr + ': ' + n + ' cases">' +
            '<div class="year-bar" style="height:' + h + 'px"></div>' +
            '<div class="year-label">' + yr.slice(2) + '</div></div>';
  });
  var container = document.getElementById('yearChart');
  container.innerHTML = html;
  container.querySelectorAll('.year-bar-wrap').forEach(function(el) {
    el.addEventListener('click', function() {
      toggleYear(el.getAttribute('data-year'));
    });
  });
}

function toggleYear(yr) {
  activeYear = activeYear === yr ? null : yr;
  buildYearChart();
  currentPage = 1;
  applyFilters();
}

function buildFilters(containerId, mode, activeSet, toggleFn) {
  var counts = {};
  ALL_DATA.forEach(function(r) {
    var vals;
    if (mode === 'categories') {
      vals = (r.summary || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    } else if (mode === 'sources') {
      vals = r.source_name ? [r.source_name] : [];
    } else {
      vals = (r.country || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    vals.forEach(function(v) { if (v) counts[v] = (counts[v] || 0) + 1; });
  });

  var sorted = Object.keys(counts)
    .map(function(k) { return [k, counts[k]]; })
    .sort(function(a, b) { return b[1] - a[1]; })
    .slice(0, 20);

  var html = '';
  sorted.forEach(function(item) {
    var val = item[0];
    var count = item[1];
    var cls = activeSet.has(val) ? 'filter-btn active' : 'filter-btn';
    html += '<button class="' + cls + '" data-val="' + esc(val) + '">' +
            '<span>' + esc(val) + '</span>' +
            '<span class="filter-count">' + count + '</span>' +
            '</button>';
  });

  var container = document.getElementById(containerId);
  container.innerHTML = html;
  container.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toggleFn(btn.getAttribute('data-val'));
    });
  });
}

function toggleCategory(val) {
  if (activeCategories.has(val)) { activeCategories.delete(val); } else { activeCategories.add(val); }
  buildFilters('categoryFilters', 'categories', activeCategories, toggleCategory);
  currentPage = 1; applyFilters();
}
function toggleSource(val) {
  if (activeSources.has(val)) { activeSources.delete(val); } else { activeSources.add(val); }
  buildFilters('sourceFilters', 'sources', activeSources, toggleSource);
  currentPage = 1; applyFilters();
}
function toggleCountry(val) {
  if (activeCountries.has(val)) { activeCountries.delete(val); } else { activeCountries.add(val); }
  buildFilters('countryFilters', 'countries', activeCountries, toggleCountry);
  currentPage = 1; applyFilters();
}

function applyFilters() {
  filtered = ALL_DATA.filter(function(r) {
    if (activeYear && (r.date_published || '').slice(0, 4) !== activeYear) return false;
    if (activeCategories.size > 0) {
      var cats = (r.summary || '').split(',').map(function(s) { return s.trim(); });
      var ok = false;
      cats.forEach(function(c) { if (activeCategories.has(c)) ok = true; });
      if (!ok) return false;
    }
    if (activeSources.size > 0 && !activeSources.has(r.source_name)) return false;
    if (activeCountries.size > 0) {
      var cs = (r.country || '').split(',').map(function(s) { return s.trim(); });
      var ok2 = false;
      cs.forEach(function(c) { if (activeCountries.has(c)) ok2 = true; });
      if (!ok2) return false;
    }
    if (searchQuery) {
      var hay = [r.title, r.organisation, r.country, r.summary, r.source_name].join(' ').toLowerCase();
      if (hay.indexOf(searchQuery) === -1) return false;
    }
    return true;
  });
  render();
}

function render() {
  var sort = document.getElementById('sortSelect').value;
  var sorted = filtered.slice().sort(function(a, b) {
    if (sort === 'date_desc') return (b.date_published || '') > (a.date_published || '') ? 1 : -1;
    if (sort === 'date_asc')  return (a.date_published || '') > (b.date_published || '') ? 1 : -1;
    if (sort === 'title_asc') return (a.title || '').localeCompare(b.title || '');
    if (sort === 'org_asc')   return (a.organisation || '').localeCompare(b.organisation || '');
    return 0;
  });

  var totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  var page = sorted.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  document.getElementById('resultCount').innerHTML =
    'Showing <strong>' + sorted.length + '</strong> of ' + ALL_DATA.length + ' use cases';

  if (sorted.length === 0) {
    document.getElementById('cards').innerHTML =
      '<div class="no-results"><p>No results</p><p>Try adjusting your filters</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var cardsHtml = '';
  page.forEach(function(r) {
    var date = (r.date_published || '-').slice(0, 7);
    var cats = (r.summary || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean).slice(0, 3);
    var titleInner = r.url
      ? '<a href="' + esc(r.url) + '" target="_blank" rel="noopener">' + esc(r.title || 'Untitled') + '</a>'
      : esc(r.title || 'Untitled');
    var country1 = r.country ? r.country.split(',')[0].trim() : '';
    var tagsHtml = '';
    if (country1) tagsHtml += '<span class="tag country">' + esc(country1) + '</span>';
    tagsHtml += '<span class="tag source">' + esc(r.source_name) + '</span>';
    cats.forEach(function(c) { tagsHtml += '<span class="tag">' + esc(c) + '</span>'; });
    cardsHtml +=
      '<div class="card">' +
        '<div class="card-title">' + titleInner + '</div>' +
        '<div class="card-date">' + esc(date) + '</div>' +
        '<div class="card-meta">' +
          (r.organisation ? '<span>' + esc(r.organisation) + '</span>' : '') +
          tagsHtml +
        '</div>' +
      '</div>';
  });
  document.getElementById('cards').innerHTML = cardsHtml;

  var pages = [];
  if (totalPages > 1) {
    pages.push('<button class="page-btn" id="prevBtn"' + (currentPage === 1 ? ' disabled' : '') + '>Prev</button>');
    for (var i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
        pages.push('<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>');
      } else if (Math.abs(i - currentPage) === 3) {
        pages.push('<span style="padding:6px 4px;color:var(--muted);font-size:11px">...</span>');
      }
    }
    pages.push('<button class="page-btn" id="nextBtn"' + (currentPage === totalPages ? ' disabled' : '') + '>Next</button>');
  }
  var paginationEl = document.getElementById('pagination');
  paginationEl.innerHTML = pages.join('');
  paginationEl.querySelectorAll('[data-page]').forEach(function(btn) {
    btn.addEventListener('click', function() { goPage(parseInt(btn.getAttribute('data-page'))); });
  });
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  if (prevBtn) prevBtn.addEventListener('click', function() { goPage(currentPage - 1); });
  if (nextBtn) nextBtn.addEventListener('click', function() { goPage(currentPage + 1); });
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo(0, 0);
}

function resetAll() {
  activeYear = null;
  activeCategories.clear();
  activeSources.clear();
  activeCountries.clear();
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'date_desc';
  currentPage = 1;
  buildYearChart();
  buildFilters('categoryFilters', 'categories', activeCategories, toggleCategory);
  buildFilters('sourceFilters', 'sources', activeSources, toggleSource);
  buildFilters('countryFilters', 'countries', activeCountries, toggleCountry);
  applyFilters();
}

init();
</script>
</body>
</html>
